apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp1
  template:
    metadata:
      labels:
        app: myapp1
        demo: myapp
      annotations:
        retina.sh/v1alpha: observe
    spec:
      containers:
        - name: myapp1
          image: nginx
          ports:
            - containerPort: 80
          command: ["/bin/sh", "-c", "apt update; echo $HOSTNAME > /usr/share/nginx/html/index.html; nginx -g 'daemon off;' & while true; do curl -s myapp2; curl -s myapp3; sleep 1;done"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: myapp1
spec:
  selector:
    app: myapp1
  ports:
  - port: 80
    targetPort: 80
---
